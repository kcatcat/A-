name: 股票监控

on:
  schedule:
    # 集合竞价 9:15-9:30 + 9:30-10:00 开盘后，每分钟运行（UTC 1:15-1:30）
    - cron: '*/1 1 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: 强制清理并拉取最新代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
      
      - name: 确认文件版本
        run: |
          echo "=== 当前目录 ==="
          ls -la
          echo "=== monitor.py 内容 ==="
          cat monitor.py
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 安装依赖
        run: pip install requests
        
      - name: 运行监控
        run: python3 -u monitor.py
